spring:
  application:
    name: booking-service
  datasource:
    url: jdbc:h2:file:./data/calvin
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop # prototype only — schema and data are recreated on every restart
    show-sql: false
    open-in-view: false
  h2:
    console:
      enabled: false
server:
  port: 8081
  servlet:
    context-path: /api/v1

cors:
  allowed-origins: "http://localhost:4200"

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
